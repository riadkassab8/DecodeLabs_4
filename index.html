<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project 4: Form Design & Validation</title>
  <style>
    :root {
      --page: #f4f7fb;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --line: #cbd5e1;
      --focus: #2563eb;
      --valid: #15803d;
      --valid-bg: #ecfdf3;
      --invalid: #b91c1c;
      --invalid-bg: #fef2f2;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--page);
      line-height: 1.5;
    }

    main {
      width: min(100%, 720px);
    }

    .card {
      padding: 28px;
      background: var(--card);
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .header {
      margin-bottom: 24px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--focus);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 6vw, 2.5rem);
      line-height: 1.1;
    }

    .intro {
      margin: 0;
      color: var(--muted);
    }

    form {
      display: grid;
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label,
    .checkbox-label {
      font-weight: 800;
    }

    input {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: #ffffff;
      font: inherit;
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    input:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.16);
    }

    input.is-valid {
      border-color: var(--valid);
      background: var(--valid-bg);
    }

    input.is-valid:focus {
      box-shadow: 0 0 0 3px rgba(21, 128, 61, 0.18);
    }

    input.is-invalid {
      border-color: var(--invalid);
      background: var(--invalid-bg);
    }

    input.is-invalid:focus {
      box-shadow: 0 0 0 3px rgba(185, 28, 28, 0.18);
    }

    .message {
      min-height: 22px;
      font-size: 0.92rem;
      font-weight: 700;
    }

    .message.error {
      color: var(--invalid);
    }

    .message.success {
      color: var(--valid);
    }

    .checkbox-field {
      display: grid;
      gap: 8px;
    }

    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .checkbox-row input {
      width: 20px;
      min-width: 20px;
      height: 20px;
      min-height: 20px;
      margin-top: 3px;
      padding: 0;
      accent-color: var(--valid);
    }

    button[type="submit"] {
      min-height: 50px;
      margin-top: 4px;
      border: 0;
      border-radius: 8px;
      color: #ffffff;
      background: var(--focus);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease;
    }

    button[type="submit"]:hover {
      background: #1d4ed8;
    }

    button[type="submit"]:active {
      transform: translateY(1px);
    }

    .success-banner {
      display: none;
      margin-bottom: 18px;
      padding: 14px 16px;
      color: var(--valid);
      background: var(--valid-bg);
      border: 1px solid var(--valid);
      border-radius: 8px;
      font-weight: 800;
    }

    .success-banner.is-visible {
      display: block;
    }

    @media (min-width: 640px) {
      .card {
        padding: 36px;
      }

      .two-column {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-labelledby="page-title">
      <div class="header">
        <p class="eyebrow">Project 4</p>
        <h1 id="page-title">Form Design &amp; Validation</h1>
        <p class="intro">A semantic, accessible, custom-validated registration form built with pure HTML, CSS, and JavaScript.</p>
      </div>

      <div class="success-banner" id="form-success" role="alert" aria-live="polite">
        Success! Your form has been validated and submitted in browser memory.
      </div>

      <form id="registration-form" novalidate>
        <div class="field">
          <label for="full-name">Full Name</label>
          <input
            type="text"
            id="full-name"
            name="fullName"
            autocomplete="name"
            required
            aria-describedby="full-name-error"
          >
          <span class="message" id="full-name-error" role="alert" aria-live="polite"></span>
        </div>

        <div class="field">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            required
            aria-describedby="email-error"
          >
          <span class="message" id="email-error" role="alert" aria-live="polite"></span>
        </div>

        <div class="two-column">
          <div class="field">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="new-password"
              required
              aria-describedby="password-error"
            >
            <span class="message" id="password-error" role="alert" aria-live="polite"></span>
          </div>

          <div class="field">
            <label for="confirm-password">Confirm Password</label>
            <input
              type="password"
              id="confirm-password"
              name="confirmPassword"
              autocomplete="new-password"
              required
              aria-describedby="confirm-password-error"
            >
            <span class="message" id="confirm-password-error" role="alert" aria-live="polite"></span>
          </div>
        </div>

        <div class="field">
          <label for="phone">Phone Number <span aria-hidden="true">(optional)</span></label>
          <input
            type="text"
            id="phone"
            name="phone"
            autocomplete="tel"
            aria-describedby="phone-error"
          >
          <span class="message" id="phone-error" role="alert" aria-live="polite"></span>
        </div>

        <div class="checkbox-field">
          <div class="checkbox-row">
            <input
              type="checkbox"
              id="terms"
              name="terms"
              required
              aria-describedby="terms-error"
            >
            <label class="checkbox-label" for="terms">I agree to the Terms &amp; Conditions</label>
          </div>
          <span class="message" id="terms-error" role="alert" aria-live="polite"></span>
        </div>

        <button type="submit">Create Account</button>
      </form>
    </section>
  </main>

  <script>
    const form = document.querySelector("#registration-form");
    const successBanner = document.querySelector("#form-success");
    const passwordRegex = /^(?=.*?[A-Z])(?=.*?[a-z])(?=.*?[0-9])(?=.*?[#?!@$%^&*-]).{8,}$/;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    const fields = {
      fullName: {
        input: document.querySelector("#full-name"),
        message: document.querySelector("#full-name-error")
      },
      email: {
        input: document.querySelector("#email"),
        message: document.querySelector("#email-error")
      },
      password: {
        input: document.querySelector("#password"),
        message: document.querySelector("#password-error")
      },
      confirmPassword: {
        input: document.querySelector("#confirm-password"),
        message: document.querySelector("#confirm-password-error")
      },
      phone: {
        input: document.querySelector("#phone"),
        message: document.querySelector("#phone-error")
      },
      terms: {
        input: document.querySelector("#terms"),
        message: document.querySelector("#terms-error")
      }
    };

    function setFieldState(field, isValid, message) {
      field.message.textContent = message;
      field.message.className = isValid ? "message success" : "message error";
      field.input.classList.toggle("is-valid", isValid);
      field.input.classList.toggle("is-invalid", !isValid);
      field.input.setAttribute("aria-invalid", String(!isValid));
      field.input.setAttribute("aria-describedby", field.message.id);
    }

    function validateName() {
      const field = fields.fullName;

      if (field.input.value.trim() === "") {
        setFieldState(field, false, "Full Name is required.");
        return false;
      }

      setFieldState(field, true, "Full Name looks good.");
      return true;
    }

    function validateEmail() {
      const field = fields.email;

      if (!emailRegex.test(field.input.value.trim())) {
        setFieldState(field, false, "Email Address must be a valid email format.");
        return false;
      }

      setFieldState(field, true, "Email Address is valid.");
      return true;
    }

    function validatePassword() {
      const field = fields.password;
      const value = field.input.value;

      if (!passwordRegex.test(value)) {
        setFieldState(
          field,
          false,
          "Password must include uppercase, lowercase, digit, special character from [#!@$%^&*-], and be at least 8 characters."
        );
        return false;
      }

      setFieldState(field, true, "Password meets all security requirements.");
      return true;
    }

    function validateConfirmPassword() {
      const field = fields.confirmPassword;

      if (field.input.value !== fields.password.input.value || field.input.value === "") {
        setFieldState(field, false, "Confirm Password must exactly match the password.");
        return false;
      }

      setFieldState(field, true, "Confirm Password matches.");
      return true;
    }

    function validatePhone() {
      const field = fields.phone;

      if (field.input.value.trim() === "") {
        setFieldState(field, true, "Phone Number is optional and valid.");
        return true;
      }

      setFieldState(field, true, "Phone Number has been provided.");
      return true;
    }

    function validateTerms() {
      const field = fields.terms;

      if (!field.input.checked) {
        setFieldState(field, false, "You must agree to the Terms & Conditions.");
        return false;
      }

      setFieldState(field, true, "Terms & Conditions accepted.");
      return true;
    }

    function validateForm() {
      const checks = [
        validateName(),
        validateEmail(),
        validatePassword(),
        validateConfirmPassword(),
        validatePhone(),
        validateTerms()
      ];

      return checks.every(Boolean);
    }

    fields.fullName.input.addEventListener("blur", validateName);
    fields.email.input.addEventListener("blur", validateEmail);
    fields.password.input.addEventListener("blur", () => {
      validatePassword();

      if (fields.confirmPassword.input.value !== "") {
        validateConfirmPassword();
      }
    });
    fields.confirmPassword.input.addEventListener("blur", validateConfirmPassword);
    fields.phone.input.addEventListener("blur", validatePhone);
    fields.terms.input.addEventListener("blur", validateTerms);

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      successBanner.classList.remove("is-visible");

      if (validateForm()) {
        successBanner.classList.add("is-visible");
      }
    });
  </script>
</body>
</html>
